name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross-compiler
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o mimir-mcp-linux-${{ matrix.goarch }} ./cmd/mimir-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimir-mcp-linux-${{ matrix.goarch }}
          path: mimir-mcp-linux-${{ matrix.goarch }}

  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o mimir-mcp-darwin-${{ matrix.goarch }} ./cmd/mimir-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimir-mcp-darwin-${{ matrix.goarch }}
          path: mimir-mcp-darwin-${{ matrix.goarch }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/', ''
          go build -trimpath -ldflags "-s -w -X main.Version=$VERSION" -o mimir-mcp-windows-amd64.exe ./cmd/mimir-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimir-mcp-windows-amd64
          path: mimir-mcp-windows-amd64.exe

  release:
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true

  pypi:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Update version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" python/pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" python/mimir_vertical/__init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" python/mimir_vertical/cli.py

      - name: Build package
        run: |
          cd python
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd python
          twine upload dist/* || true
